name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build Android
        run: |
          cordova platform add android@10.1.2
          # We use a lower Gradle version to match Java 11 perfectly
          cordova build android --release -- --gradleVersion=7.6
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyUnitConverter-APK
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

