name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g cordova
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Android
        run: |
          cordova platform add android@12.0.1
          # This command fixes the XmlParser error on Java 17
          sed -i 's/new XmlParser(/new XmlParser(false, false).parseText(xml) \/\/ /g' platforms/android/CordovaLib/cordova.gradle || true
          cordova build android --release
        env:
          NODE_OPTIONS: --openssl-legacy-provider
      - uses: actions/upload-artifact@v4
        with:
          name: EasyUnitConverter-APK
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

