name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11' # Moving back to 11 for maximum compatibility with XmlParser

      - name: Build Android
        run: |
          # We force a slightly older, very stable version of the Android engine
          cordova platform add android@10.1.2 
          cordova build android --release
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyUnitConverter-APK
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

